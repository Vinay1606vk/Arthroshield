                </div>
                
                <div class="progress-category">
                    <div class="category-title">
                        <i class="fas fa-apple-alt"></i> Diet
                    </div>
                    <div class="stats-row">
                        <div class="stat-box total">
                            <div class="stat-number">${progress.categories.diet.total}</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat-box completed">
                            <div class="stat-number">${progress.categories.diet.completed}</div>
                            <div class="stat-label">Completed</div>
                        </div>
                        <div class="stat-box ${progress.categories.diet.completion >= 75 ? 'completed' : 'incomplete'}">
                            <div class="stat-number">${progress.categories.diet.completion}%</div>
                            <div class="stat-label">Progress</div>
                        </div>
                    </div>
                </div>
                
                <div class="progress-category">
                    <div class="category-title">
                        <i class="fas fa-pills"></i> Medication
                    </div>
                    <div class="stats-row">
                        <div class="stat-box total">
                            <div class="stat-number">${progress.categories.medication.total}</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat-box completed">
                            <div class="stat-number">${progress.categories.medication.completed}</div>
                            <div class="stat-label">Completed</div>
                        </div>
                        <div class="stat-box ${progress.categories.medication.completion >= 75 ? 'completed' : 'incomplete'}">
                            <div class="stat-number">${progress.categories.medication.completion}%</div>
                            <div class="stat-label">Progress</div>
                        </div>
                    </div>
                </div>
                
                ${progress.lastUpdated ? `
                    <div style="margin-top: 1rem; padding: 0.75rem; background: #f3f4f6; border-radius: 8px; text-align: center;">
                        <small style="color: #666;">Last updated: ${new Date(progress.lastUpdated).toLocaleString()}</small>
                    </div>
                ` : ''}
            `;
        }

        

        // Generate detailed progress HTML
        function generateDetailedProgressHTML(activity, progress) {
            const summary = buildProgressSummary(activity, progress);
            return `
                <div class="am-section">
                    <div class="am-section-header">
                        <div class="am-section-title"><i class="fas fa-info-circle"></i> Progress Summary</div>
                        <div class="am-muted">${summary.overallPercent}% complete</div>
                    </div>
                    <div class="stats-row">
                        <div class="stat-box total"><div class="stat-number">${summary.totalItems}</div><div class="stat-label">Total Activities</div></div>
                        <div class="stat-box completed"><div class="stat-number">${summary.completedItems}</div><div class="stat-label">Completed</div></div>
                        <div class="stat-box incomplete"><div class="stat-number">${summary.pendingItems}</div><div class="stat-label">Not Completed</div></div>
                    </div>
                    <div class="am-kv"><div class="am-k">Duration</div><div class="am-v">${activity.duration || '-'}</div></div>
                    <div class="am-kv"><div class="am-k">End Date</div><div class="am-v">${activity.endDate ? new Date(activity.endDate).toLocaleDateString() : '-'}</div></div>
                    <div class="am-kv"><div class="am-k">Activities / day</div><div class="am-v">${summary.activitiesPerDay}</div></div>
                    <div class="am-kv"><div class="am-k">Total planned days</div><div class="am-v">${summary.totalDays}</div></div>
                </div>
                
                ${activity.exercise && activity.exercise.length > 0 ? `
                    <div class="progress-category">
                        <div class="category-title">
                            <i class="fas fa-dumbbell"></i> Exercise Progress
                        </div>
                        ${activity.exercise.map((item, index) => `
                            <div class="detail-item ${progress[`exercise_${index}`]?.completed ? 'completed' : ''}">
                                <strong>${item.name}</strong> - ${item.duration || '-'}
                                ${progress[`exercise_${index}`]?.completed ? 
                                    '<span style="color: #10b981; margin-left: 1rem;">✓ Completed</span>' : 
                                    '<span style="color: #ef4444; margin-left: 1rem;">○ Pending</span>'
                                }
                                ${progress[`exercise_${index}`]?.completedAt ? 
                                    `<br><small style="color: #666;">Completed: ${new Date(progress[`exercise_${index}`].completedAt).toLocaleString()}</small>` : ''
                                }
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                
                ${activity.diet && activity.diet.length > 0 ? `
                    <div class="progress-category">
                        <div class="category-title">
                            <i class="fas fa-apple-alt"></i> Diet Progress
                        </div>
                        ${activity.diet.map((item, index) => `
                            <div class="detail-item ${progress[`diet_${index}`]?.completed ? 'completed' : ''}">
                                <strong>${item.food}</strong> - ${item.times || '-'}
                                ${progress[`diet_${index}`]?.completed ? 
                                    '<span style="color: #10b981; margin-left: 1rem;">✓ Completed</span>' : 
                                    '<span style="color: #ef4444; margin-left: 1rem;">○ Pending</span>'
                                }
                                ${progress[`diet_${index}`]?.completedAt ? 
                                    `<br><small style="color: #666;">Completed: ${new Date(progress[`diet_${index}`].completedAt).toLocaleString()}</small>` : ''
                                }
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                
                ${activity.medication && activity.medication.length > 0 ? `
                    <div class="progress-category">
                        <div class="category-title">
                            <i class="fas fa-pills"></i> Medication Progress
                        </div>
                        ${activity.medication.map((item, index) => `
                            <div class="detail-item ${progress[`medication_${index}`]?.completed ? 'completed' : ''}">
                                <strong>${item.medicine}</strong> - ${item.times}
                                ${progress[`medication_${index}`]?.completed ? 
                                    '<span style="color: #10b981; margin-left: 1rem;">✓ Completed</span>' : 
                                    '<span style="color: #ef4444; margin-left: 1rem;">○ Pending</span>'
                                }
                                ${progress[`medication_${index}`]?.completedAt ? 
                                    `<br><small style="color: #666;">Completed: ${new Date(progress[`medication_${index}`].completedAt).toLocaleString()}</small>` : ''
                                }
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                
                <div style="margin-top: 1.5rem; padding: 1rem; background: #f9fafb; border-radius: 8px;">
                    <h4 style="margin: 0 0 0.5rem 0; color: #333;">Overall Status</h4>
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div style="flex: 1;">
                            <div style="background: #e5e7eb; height: 8px; border-radius: 4px; overflow: hidden;">
                                <div style="width: ${calculateActivityProgress(activity, progress)}%; height: 100%; background: linear-gradient(90deg, #10b981, #059669);"></div>
                            </div>
                        </div>
                        <span style="font-weight: 600; color: #333;">${calculateActivityProgress(activity, progress)}% Complete</span>
                    </div>
                </div>

                <div class="am-section">
                    <div class="am-section-header">
                        <div class="am-section-title"><i class="fas fa-chart-bar"></i> Progress Graph</div>
                        <button class="btn-secondary" type="button" onclick="toggleProgressGraph()" style="padding: 0.6rem 1rem;">View Graph</button>
                    </div>
                    <div id="amGraph" class="am-graph" style="display: none;">
                        ${renderProgressGraphRows(summary)}
                    </div>
                </div>
            `;
        }

        function toggleProgressGraph() {
            const el = document.getElementById('amGraph');
            if (!el) return;
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function renderProgressGraphRows(summary) {
            const rows = [
                { label: 'Diet', percent: summary.dietPercent },
                { label: 'Activity', percent: summary.exercisePercent },
                { label: 'Medication', percent: summary.medicationPercent },
                { label: 'Overall', percent: summary.overallPercent }
            ];

            return rows.map(r => `
                <div class="am-bar-row">
                    <div class="am-k">${r.label}</div>
                    <div class="am-bar"><div style="width:${r.percent}%;"></div></div>
                    <div class="am-v" style="text-align:right;">${r.percent}%</div>
                </div>
            `).join('');
        }

        function buildProgressSummary(activity, progress) {
            const totals = {
                diet: (activity.diet || []).length,
                exercise: (activity.exercise || []).length,
                medication: (activity.medication || []).length
            };
            const completed = {
                diet: (activity.diet || []).filter((_, idx) => !!progress[`diet_${idx}`]?.completed).length,
                exercise: (activity.exercise || []).filter((_, idx) => !!progress[`exercise_${idx}`]?.completed).length,
                medication: (activity.medication || []).filter((_, idx) => !!progress[`medication_${idx}`]?.completed).length
            };

            const totalItems = totals.diet + totals.exercise + totals.medication;
            const completedItems = completed.diet + completed.exercise + completed.medication;
            const pendingItems = totalItems - completedItems;
            const overallPercent = totalItems > 0 ? Math.round((completedItems / totalItems) * 100) : 0;

            const totalDays = estimateTotalDaysFromDuration(activity.duration);
            const activitiesPerDay = totalDays > 0 ? (totalItems / totalDays).toFixed(2) : '0';

            const dietPercent = totals.diet > 0 ? Math.round((completed.diet / totals.diet) * 100) : 0;
            const exercisePercent = totals.exercise > 0 ? Math.round((completed.exercise / totals.exercise) * 100) : 0;
            const medicationPercent = totals.medication > 0 ? Math.round((completed.medication / totals.medication) * 100) : 0;

            return {
                totalItems,
                completedItems,
                pendingItems,
                overallPercent,
                totalDays,
                activitiesPerDay,
                dietPercent,
                exercisePercent,
                medicationPercent
            };
        }

        function estimateTotalDaysFromDuration(durationStr) {
            if (!durationStr) return 0;
            const m = String(durationStr).trim().match(/^(\d+)\s*(day|days|week|weeks|month|months)$/i);
            if (!m) return 0;
            const value = parseInt(m[1], 10);
            const unit = m[2].toLowerCase();
            if (unit.startsWith('day')) return value;
            if (unit.startsWith('week')) return value * 7;
            if (unit.startsWith('month')) return value * 30;
            return 0;
        }

        // Calculate activity progress percentage
        function calculateActivityProgress(activity, progress) {
            let totalItems = 0;
            let completedItems = 0;
            
            // Count exercise items
            if (activity.exercise && activity.exercise.length > 0) {
                totalItems += activity.exercise.length;
                completedItems += activity.exercise.filter((item, index) => 
                    progress[`exercise_${index}`]?.completed
                ).length;
            }
            
            // Count diet items
            if (activity.diet && activity.diet.length > 0) {
                totalItems += activity.diet.length;
                completedItems += activity.diet.filter((item, index) => 
                    progress[`diet_${index}`]?.completed
                ).length;
            }
            
            // Count medication items
            if (activity.medication && activity.medication.length > 0) {
                totalItems += activity.medication.length;
                completedItems += activity.medication.filter((item, index) => 
                    progress[`medication_${index}`]?.completed
                ).length;
            }
            
            return totalItems > 0 ? Math.round((completedItems / totalItems) * 100) : 0;
        }

        // Start real-time progress monitoring
        function startProgressMonitoring() {
            // Check for progress updates every 30 seconds
            setInterval(() => {
                checkProgressUpdates();
            }, 30000);
        }

        // Check for progress updates
        function checkProgressUpdates() {
            const previousProgress = new Map();
            
            // Store current progress
            activities.forEach(activity => {
                const progress = getPatientProgressData(activity.patientId);
                previousProgress.set(activity.patientId, progress);
            });
            
            // Check for updates after a short delay
            setTimeout(() => {
                activities.forEach(activity => {
                    const currentProgress = getPatientProgressData(activity.patientId);
                    const previous = previousProgress.get(activity.patientId);
                    
                    // Check if progress has changed
                    if (JSON.stringify(currentProgress) !== JSON.stringify(previous)) {
                        // Show notification for significant progress
                        if (currentProgress.overallCompletion > previous.overallCompletion) {
                            showProgressNotification(activity.patientName, currentProgress.overallCompletion);
                        }
                    }
                });
            }, 1000);
        }

        // Show progress notification
        function showProgressNotification(patientName, progress) {
            const notification = {
                id: 'PROG-' + Date.now(),
                type: 'progress',
                message: `${patientName} has reached ${progress}% completion!`,
                timestamp: new Date().toISOString(),
                activityId: null
            };
            
            const notifications = JSON.parse(localStorage.getItem('doctor_notifications') || '[]');
            notifications.unshift(notification);
            
            // Keep only last 50 notifications
            if (notifications.length > 50) {
                notifications.splice(50);
            }
            
            localStorage.setItem('doctor_notifications', JSON.stringify(notifications));
            updateNotificationBadge();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
    </script>

    <div id="amToast" style="display:none; position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); z-index: 5000; padding: 0.85rem 1.1rem; border-radius: 999px; font-weight: 700; gap: 0.6rem; align-items: center; box-shadow: 0 18px 40px rgba(0,0,0,0.25);"></div>

        #amToast.success { background: linear-gradient(135deg, #10b981, #059669); color: #ffffff; }
        #amToast.error { background: linear-gradient(135deg, #ef4444, #dc2626); color: #ffffff; }
    </style>
