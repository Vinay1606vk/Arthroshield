<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTHROSHIELD - Patients Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem 3%;
        }
        
        .page-header {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .page-title {
            font-size: 2rem;
            color: #333;
            font-weight: 700;
        }
        
        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .search-box {
            position: relative;
            width: 300px;
        }
        
        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 3rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .export-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
        
        .back-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .content-card {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .add-patient-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .add-patient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
        
        .patients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .patient-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 12px;
            padding: 1.5rem;
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .patient-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }
        
        .patient-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .patient-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin-right: 1rem;
        }
        
        .patient-info h4 {
            margin: 0 0 0.25rem 0;
            color: #333;
            font-size: 1.2rem;
        }
        
        .patient-info p {
            margin: 0;
            color: #666;
            font-size: 0.9rem;
        }
        
        .patient-details {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        .detail-label {
            color: #666;
        }
        
        .detail-value {
            color: #333;
            font-weight: 600;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #666;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .close-btn:hover {
            color: #ef4444;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
            cursor: pointer;
        }
        
        .form-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        /* Patient Detail Modal */
        .patient-detail-section {
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.25rem;
        }
        
        .info-value {
            font-weight: 600;
            color: #333;
        }
        
        .xray-list {
            list-style: none;
            padding: 0;
        }
        
        .xray-item {
            background: #f8f9fa;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .xray-item:hover {
            background: #e9ecef;
            border-color: #667eea;
        }
        
        .xray-date {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.25rem;
        }
        
        .xray-details {
            font-size: 0.9rem;
            color: #666;
        }
        
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .action-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e5e7eb;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .medical-notes {
            width: 100%;
            min-height: 100px;
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
        }
        
        .medical-notes:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        
        .no-results i {
            font-size: 3rem;
            color: #e5e7eb;
            margin-bottom: 1rem;
        }
        
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            
            .header-actions {
                width: 100%;
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
            
            .patients-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <div class="header-content">
                <h1 class="page-title"><i class="fas fa-users"></i> Patients Management</h1>
                <div class="header-actions">
                    <div class="search-box">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input" id="searchInput" placeholder="Search patients...">
                    </div>
                    <button class="export-btn" onclick="exportPatients()">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <a href="doctor-welcome.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
        
        <div class="content-card">
            <button class="add-patient-btn" onclick="openAddPatientModal()">
                <i class="fas fa-plus"></i> Add New Patient
            </button>
            
            <div class="patients-grid" id="patientsGrid">
                <!-- Patient cards will be dynamically generated here -->
            </div>
            
            <div class="no-results" id="noResults" style="display: none;">
                <i class="fas fa-search"></i>
                <h3>No patients found</h3>
                <p>Try adjusting your search or add a new patient</p>
            </div>
        </div>
    </div>
    
    <!-- Add Patient Modal -->
    <div class="modal" id="addPatientModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add New Patient</h2>
                <button class="close-btn" onclick="closeModal('addPatientModal')">&times;</button>
            </div>
            <form id="addPatientForm" onsubmit="handleAddPatient(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">First Name *</label>
                        <input type="text" class="form-input" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name *</label>
                        <input type="text" class="form-input" id="lastName" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Age *</label>
                        <input type="number" class="form-input" id="age" required min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Gender *</label>
                        <select class="form-select" id="gender" required>
                            <option value="">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email Address *</label>
                    <input type="email" class="form-input" id="email" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Phone Number *</label>
                    <input type="tel" class="form-input" id="phone" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Address *</label>
                    <input type="text" class="form-input" id="address" required>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-save"></i> Add Patient
                </button>
            </form>
        </div>
    </div>
    
    <!-- Patient Detail Modal -->
    <div class="modal" id="patientDetailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="detailModalTitle">Patient Details</h2>
                <button class="close-btn" onclick="closeModal('patientDetailModal')">&times;</button>
            </div>
            
            <div class="patient-detail-section">
                <h3 class="section-title">Personal Information</h3>
                <div class="info-grid" id="personalInfo">
                    <!-- Personal info will be filled dynamically -->
                </div>
            </div>
            
            <div class="patient-detail-section">
                <h3 class="section-title">X-Ray Reports</h3>
                <button class="action-btn btn-primary" onclick="addXrayReport()" style="margin-bottom: 1rem;">
                    <i class="fas fa-plus"></i> Add X-Ray Report
                </button>
                <ul class="xray-list" id="xrayList">
                    <!-- X-ray reports will be listed here -->
                </ul>
                <button class="action-btn btn-primary" onclick="viewSavedReports()">
                    <i class="fas fa-save"></i> Saved Reports
                </button>
            </div>
            
            <div class="patient-detail-section">
                <h3 class="section-title">Treatment Plans</h3>
                <div id="treatmentPlans">
                    <!-- Treatment plans will be shown here -->
                </div>
                <button class="action-btn btn-success" onclick="goToActivityManager()">
                    <i class="fas fa-calendar-alt"></i> Plan Activities
                </button>
            </div>
            
            <div class="patient-detail-section">
                <h3 class="section-title">Appointment History</h3>
                <div id="appointmentHistory">
                    <!-- Appointment history will be shown here -->
                </div>
            </div>
            
            <div class="patient-detail-section">
                <h3 class="section-title">Medical Notes</h3>
                <textarea class="medical-notes" id="medicalNotes" placeholder="Add medical notes (optional)..."></textarea>
                <button class="action-btn btn-secondary" onclick="saveMedicalNotes()">
                    <i class="fas fa-save"></i> Save Notes
                </button>
            </div>
            
            <div class="action-buttons">
                <button class="action-btn btn-primary" onclick="editPatient()">
                    <i class="fas fa-edit"></i> Edit Patient
                </button>
                <button class="action-btn btn-danger" onclick="deletePatient()">
                    <i class="fas fa-trash"></i> Delete Patient
                </button>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        let currentPatientId = null;
        let patients = [];
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            loadPatients();
            renderPatients();
            
            // Setup search functionality
            document.getElementById('searchInput').addEventListener('input', function(e) {
                searchPatients(e.target.value);
            });
        });
        
        // Load patients from localStorage
        function loadPatients() {
            const savedPatients = localStorage.getItem('arthrosheild_patients');
            if (savedPatients) {
                patients = JSON.parse(savedPatients);
            } else {
                // Default dummy data if no saved patients
                patients = [
                    {
                        id: 1,
                        name: "John Doe",
                        firstName: "John",
                        lastName: "Doe",
                        age: 45,
                        gender: "male",
                        phone: "+1 (555) 111-2222",
                        email: "john.doe@email.com",
                        address: "123 Main St, City, State 12345",
                        doctorId: 1,
                        doctorName: "Dr. Sarah Johnson",
                        createdAt: new Date().toISOString(),
                        lastVisit: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000).toISOString()
                    },
                    {
                        id: 2,
                        name: "Jane Smith",
                        firstName: "Jane",
                        lastName: "Smith",
                        age: 52,
                        gender: "female",
                        phone: "+1 (555) 333-4444",
                        email: "jane.smith@email.com",
                        address: "456 Oak Ave, City, State 67890",
                        doctorId: 2,
                        doctorName: "Dr. Michael Chen",
                        createdAt: new Date().toISOString(),
                        lastVisit: new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString()
                    },
                    {
                        id: 3,
                        name: "Robert Johnson",
                        firstName: "Robert",
                        lastName: "Johnson",
                        age: 38,
                        gender: "male",
                        phone: "+1 (555) 555-6666",
                        email: "robert.johnson@email.com",
                        address: "789 Pine Rd, City, State 11111",
                        doctorId: 1,
                        doctorName: "Dr. Sarah Johnson",
                        createdAt: new Date().toISOString(),
                        lastVisit: new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString()
                    }
                ];
                savePatients();
            }
        }
        
        // Save patients to localStorage
        function savePatients() {
            localStorage.setItem('arthrosheild_patients', JSON.stringify(patients));
        }
        
        // Render patient cards
        function renderPatients(patientsToRender = patients) {
            const grid = document.getElementById('patientsGrid');
            const noResults = document.getElementById('noResults');
            
            if (patientsToRender.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            grid.innerHTML = patientsToRender.map(patient => `
                <div class="patient-card" onclick="viewPatientDetail(${patient.id})">
                    <div class="patient-header">
                        <div class="patient-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="patient-info">
                            <h4>${patient.name}</h4>
                            <p>Patient ID: #P${String(patient.id).padStart(3, '0')}</p>
                        </div>
                    </div>
                    <div class="patient-details">
                        <div class="detail-item">
                            <span class="detail-label">Age:</span>
                            <span class="detail-value">${patient.age} years</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Gender:</span>
                            <span class="detail-value">${patient.gender.charAt(0).toUpperCase() + patient.gender.slice(1)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Phone:</span>
                            <span class="detail-value">${patient.phone}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Last Visit:</span>
                            <span class="detail-value">${formatDate(patient.lastVisit)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Search patients
        function searchPatients(query) {
            const filteredPatients = patients.filter(patient => 
                patient.name.toLowerCase().includes(query.toLowerCase()) ||
                patient.email.toLowerCase().includes(query.toLowerCase()) ||
                patient.phone.includes(query) ||
                patient.id.toString().includes(query)
            );
            renderPatients(filteredPatients);
        }
        
        // Open add patient modal
        function openAddPatientModal() {
            document.getElementById('addPatientModal').classList.add('active');
            document.getElementById('addPatientForm').reset();
        }
        
        // Close modal
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // Handle add patient
        function handleAddPatient(event) {
            event.preventDefault();
            
            const currentUser = JSON.parse(localStorage.getItem('arthrosheild_current_user'));
            
            const newPatient = {
                id: patients.length > 0 ? Math.max(...patients.map(p => p.id)) + 1 : 1,
                name: `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                age: parseInt(document.getElementById('age').value),
                gender: document.getElementById('gender').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                doctorId: currentUser?.role === 'doctor' ? currentUser.id : 1,
                doctorName: currentUser?.role === 'doctor' ? currentUser.name : 'Dr. Sarah Johnson',
                createdAt: new Date().toISOString(),
                lastVisit: new Date().toISOString()
            };
            
            patients.push(newPatient);
            savePatients();
            renderPatients();
            closeModal('addPatientModal');
            showNotification('Patient added successfully!', 'success');
        }
        
        // View patient detail
        function viewPatientDetail(patientId) {
            currentPatientId = patientId;
            const patient = patients.find(p => p.id === patientId);
            
            if (!patient) return;
            
            // Update modal title
            document.getElementById('detailModalTitle').textContent = `${patient.name} - Details`;
            
            // Fill personal information
            document.getElementById('personalInfo').innerHTML = `
                <div class="info-item">
                    <span class="info-label">Full Name</span>
                    <span class="info-value">${patient.name}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Age</span>
                    <span class="info-value">${patient.age} years</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Gender</span>
                    <span class="info-value">${patient.gender.charAt(0).toUpperCase() + patient.gender.slice(1)}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Email</span>
                    <span class="info-value">${patient.email}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Phone</span>
                    <span class="info-value">${patient.phone}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Address</span>
                    <span class="info-value">${patient.address}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Doctor</span>
                    <span class="info-value">${patient.doctorName}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Patient ID</span>
                    <span class="info-value">#P${String(patient.id).padStart(3, '0')}</span>
                </div>
            `;
            
            // Load X-ray reports
            loadXrayReports();
            
            // Load treatment plans
            loadTreatmentPlans();
            
            // Load appointment history
            loadAppointmentHistory();
            
            // Load medical notes
            loadMedicalNotes();
            
            // Show modal
            document.getElementById('patientDetailModal').classList.add('active');
        }
        
        // Load X-ray reports
        function loadXrayReports() {
            const reports = JSON.parse(localStorage.getItem('arthrosheild_reports') || '[]');
            const patientReports = reports.filter(r => r.patientId === currentPatientId);
            
            const xrayList = document.getElementById('xrayList');
            
            if (patientReports.length === 0) {
                xrayList.innerHTML = '';
            }
            
            xrayList.innerHTML = patientReports.map(report => `
                <li class="xray-item" onclick="viewReport(${report.id})">
                    <div class="xray-date">${formatDate(report.analysisDate)}</div>
                    <div class="xray-details">
                        Severity: ${report.severity.charAt(0).toUpperCase() + report.severity.slice(1)} | 
                        Confidence: ${Math.round(report.confidence * 100)}%
                    </div>
                </li>
            `).join('');
        }
        
        // Load treatment plans
        function loadTreatmentPlans() {
            const plans = JSON.parse(localStorage.getItem('arthrosheild_plans') || '[]');
            const patientPlans = plans.filter(p => p.patientId === currentPatientId);
            
            const treatmentDiv = document.getElementById('treatmentPlans');
            
            if (patientPlans.length === 0) {
                treatmentDiv.innerHTML = '<p style="color: #666;">No treatment plans found</p>';
                return;
            }
            
            treatmentDiv.innerHTML = patientPlans.map(plan => `
                <div style="background: #f8f9fa; padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem;">
                    <strong>${formatDate(plan.createdAt)}</strong>
                    <p style="margin: 0.5rem 0; font-size: 0.9rem;">${plan.diet ? 'Diet: ' + plan.diet.substring(0, 50) + '...' : ''}</p>
                </div>
            `).join('');
        }
        
        // Load appointment history
        function loadAppointmentHistory() {
            const historyDiv = document.getElementById('appointmentHistory');
            // For demo purposes, showing dummy appointment history
            historyDiv.innerHTML = `
                <div style="background: #f8f9fa; padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem;">
                    <strong>${formatDate(new Date(Date.now() - 2 * 24 * 60 * 60 * 1000).toISOString())}</strong>
                    <p style="margin: 0.5rem 0; font-size: 0.9rem;">General consultation - X-ray analysis</p>
                </div>
                <div style="background: #f8f9fa; padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem;">
                    <strong>${formatDate(new Date(Date.now() - 14 * 24 * 60 * 60 * 1000).toISOString())}</strong>
                    <p style="margin: 0.5rem 0; font-size: 0.9rem;">Initial consultation - Patient registration</p>
                </div>
            `;
        }
        
        // Load medical notes
        function loadMedicalNotes() {
            const notes = localStorage.getItem(`patient_notes_${currentPatientId}`) || '';
            document.getElementById('medicalNotes').value = notes;
        }
        
        // Save medical notes
        function saveMedicalNotes() {
            const notes = document.getElementById('medicalNotes').value;
            localStorage.setItem(`patient_notes_${currentPatientId}`, notes);
            showNotification('Medical notes saved!', 'success');
        }
        
        // Add X-ray report
        function addXrayReport() {
            closeModal('patientDetailModal');
            // Redirect to upload-xrays.html with patient ID
            window.location.href = `upload-xrays.html?patientId=${currentPatientId}`;
        }

        // View saved reports
        function viewSavedReports() {
            closeModal('patientDetailModal');
            // Redirect to reports.html with patient ID to show only that patient's reports
            window.location.href = `reports.html?patientId=${currentPatientId}`;
        }
        
        // Go to activity manager
        function goToActivityManager() {
            closeModal('patientDetailModal');
            // Redirect to activity-manager.html with patient ID
            window.location.href = `activity-manager.html?patientId=${currentPatientId}`;
        }
        
        // View report
        function viewReport(reportId) {
            closeModal('patientDetailModal');
            // Redirect to reports.html with report ID
            window.location.href = `reports.html?reportId=${reportId}`;
        }
        
        // Edit patient
        function editPatient() {
            const patient = patients.find(p => p.id === currentPatientId);
            if (!patient) return;
            
            // Fill form with patient data
            document.getElementById('firstName').value = patient.firstName;
            document.getElementById('lastName').value = patient.lastName;
            document.getElementById('age').value = patient.age;
            document.getElementById('gender').value = patient.gender;
            document.getElementById('email').value = patient.email;
            document.getElementById('phone').value = patient.phone;
            document.getElementById('address').value = patient.address;
            
            // Close detail modal and open add modal
            closeModal('patientDetailModal');
            document.getElementById('addPatientModal').classList.add('active');
            
            // Change form title and submit button
            document.querySelector('#addPatientModal .modal-title').textContent = 'Edit Patient';
            document.querySelector('#addPatientForm button[type="submit"]').innerHTML = '<i class="fas fa-save"></i> Update Patient';
            
            // Update form submit handler
            document.getElementById('addPatientForm').onsubmit = function(event) {
                event.preventDefault();
                updatePatient();
            };
        }
        
        // Update patient
        function updatePatient() {
            const patientIndex = patients.findIndex(p => p.id === currentPatientId);
            if (patientIndex === -1) return;
            
            patients[patientIndex] = {
                ...patients[patientIndex],
                name: `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                age: parseInt(document.getElementById('age').value),
                gender: document.getElementById('gender').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };
            
            savePatients();
            renderPatients();
            closeModal('addPatientModal');
            showNotification('Patient updated successfully!', 'success');
            
            // Reset form
            document.getElementById('addPatientForm').reset();
            document.querySelector('#addPatientModal .modal-title').textContent = 'Add New Patient';
            document.querySelector('#addPatientForm button[type="submit"]').innerHTML = '<i class="fas fa-save"></i> Add Patient';
            document.getElementById('addPatientForm').onsubmit = handleAddPatient;
        }
        
        // Delete patient
        function deletePatient() {
            if (confirm('Are you sure you want to delete this patient? This action cannot be undone.')) {
                patients = patients.filter(p => p.id !== currentPatientId);
                savePatients();
                renderPatients();
                closeModal('patientDetailModal');
                showNotification('Patient deleted successfully!', 'success');
            }
        }
        
        // Export patients
        function exportPatients() {
            if (patients.length === 0) {
                showNotification('No patients to export!', 'error');
                return;
            }
            
            // Create CSV content
            const csvContent = [
                ['Patient ID', 'Name', 'Age', 'Gender', 'Email', 'Phone', 'Address', 'Doctor', 'Last Visit'],
                ...patients.map(p => [
                    `#P${String(p.id).padStart(3, '0')}`,
                    p.name,
                    p.age,
                    p.gender,
                    p.email,
                    p.phone,
                    p.address,
                    p.doctorName,
                    formatDate(p.lastVisit)
                ])
            ].map(row => row.join(',')).join('\n');
            
            // Create and download CSV file
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `patients_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            
            showNotification('Patients exported successfully!', 'success');
        }
        
        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
            if (diffDays < 365) return `${Math.floor(diffDays / 30)} months ago`;
            return `${Math.floor(diffDays / 365)} years ago`;
        }
        
        // Show notification (assuming this function exists in app.js)
        function showNotification(message, type) {
            if (window.showNotification) {
                window.showNotification(message, type);
            } else {
                alert(message);
            }
        }
        
        // Close modals on outside click
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }
    </script>
</body>
</html>
